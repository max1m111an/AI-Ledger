name: ESLint Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  eslint:
    runs-on: ubuntu-latest
    name: "Check JavaScript code with ESLint"
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'apps/frontend/package-lock.json'

      - name: Install dependencies
        run: |
          set -e  # ← выход при любой ошибке
          cd apps/frontend
          npm ci --prefer-offline  # ← быстрее и надёжнее

      - name: Run ESLint
        run: |
          set -e
          cd apps/frontend
          npm run lint
